idea:
  title: '''Most Underrated'' as a Novelty Metric'
  domain: nlp
  hypothesis: 'Large language models (LLMs) struggle with generating novel responses,
    particularly when asked to name the most underrated item in a category X. If LLMs
    only identify items that are widely believed to be underrated, rather than providing
    less obvious or truly novel answers, this indicates a lack of deeper reasoning
    about novelty. Using the ''most underrated'' prompt can serve as a diagnostic
    to evaluate LLMs'' capacity for genuine novelty and innovation.

    '
  background:
    description: 'LLMs are currently poor at producing novel outputs, and the reasons
      for this are not entirely clear. One way to test whether LLMs possess enough
      ''taste'' or discernment to be novel is to ask them to name the most underrated
      thing in a given category. If their answers align with those commonly cited
      as underrated (e.g., on relevant subreddits), this does not count as true novelty.
      The distinction is fuzzy, but initial observations suggest LLMs tend to provide
      obvious answers, indicating a significant gap in their ability to reason about
      what is genuinely underrated. This limitation may hinder their potential for
      true innovation.

      '
